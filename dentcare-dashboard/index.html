<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DentCare Pro — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" integrity="sha384-O0bVVqLfN3wPyUMX+lJ2bkQfDJlIkw6Akd+c2uXOUmg0uDY+DylXzr5PrlBQ4KkQ" crossorigin="anonymous">
</head>
<body>

  <!-- Login View -->
  <div id="login-view" class="view">
    <div class="auth-card">
      <h1>DentCare Pro</h1>
      <form id="login-form">
        <label>Email<input type="email" id="login-email" required></label>
        <label>Password<input type="password" id="login-password" required></label>
        <div class="actions">
          <button type="submit">Sign in</button>
          <button type="button" id="open-register">Patient Register</button>
        </div>
      </form>
    </div>
  </div>

  <!-- App Layout -->
  <div id="app" class="hidden">
    <aside id="sidebar"></aside>
    <div id="main-area">
      <header id="topbar"></header>
      <main id="content"></main>
        <div id="page-treatment-plans" class="page"></div>
    </div>
  </div>

  <!-- Modal Root -->
  <div id="modal-root"></div>

  <!-- Toast Root -->
  <div id="toast-root" aria-live="polite"></div>

  <!-- Script order is important -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/modals.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js" integrity="sha384-vXBx+4tVpfwxaTBKfdbRbBZXKMRFfdGZ+I59JwMpExvb4UQhYGNWwoB5d2Nb/cqU" crossorigin="anonymous"></script>
  <script src="js/auth.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/patient-portal.js"></script>
  <script src="js/patients.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/dental-chart.js"></script>
  <script src="js/medical-records.js"></script>
  <script src="js/prescriptions.js"></script>
  <script src="js/pharmacy.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/xrays.js"></script>
  <script src="js/staff.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/treatment-plans.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
